<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Databricks DEA — Entraînement à la certification</title>
  <meta name="description" content="Application d'entraînement à la certification Databricks Certified Data Engineer Associate : cours complet par section et examens blancs avec correction et renvoi vers le cours." />

  <!-- Polices -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   Databricks DEA Trainer — styles
   Palette « console d'ingénierie » + accents médaillon
   ============================================================ */
:root{
  --ink:#0d1014;
  --surface:#151a21;
  --surface-2:#1c232d;
  --surface-3:#232c38;
  --line:#2b3542;
  --line-soft:#222a34;
  --text:#e8ecf2;
  --muted:#8a97a8;
  --muted-2:#6b7686;
  --bronze:#c77b3b;
  --silver:#aeb9c7;
  --gold:#e3b23c;
  --lava:#ff4a2e;
  --lava-soft:#ff6a52;
  --ok:#3fcf8e;
  --bad:#ff5f6d;
  --radius:14px;
  --radius-sm:9px;
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --display:"Space Grotesk",system-ui,sans-serif;
  --body:"Inter",system-ui,sans-serif;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:var(--body);color:var(--text);
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(255,74,46,.07), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(227,178,60,.05), transparent 55%),
    var(--ink);
  font-size:15.5px;line-height:1.6;-webkit-font-smoothing:antialiased;
}
a{color:var(--lava-soft);text-decoration:none}
a:hover{text-decoration:underline}
code{font-family:var(--mono);font-size:.86em}
::selection{background:rgba(255,74,46,.3)}

/* ---------- Layout shell ---------- */
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.sidebar{
  position:sticky;top:0;height:100vh;overflow-y:auto;
  background:linear-gradient(180deg,var(--surface) 0%, #11161c 100%);
  border-right:1px solid var(--line);padding:22px 16px;
}
.main{min-width:0;padding:0 0 80px}
.content{max-width:880px;margin:0 auto;padding:34px 28px}

/* ---------- Brand / medallion mark ---------- */
.brand{display:flex;gap:13px;align-items:center;margin:2px 6px 22px}
.mark{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.mark span{display:block;height:5px;border-radius:3px}
.mark .b{width:14px;background:var(--bronze)}
.mark .s{width:21px;background:var(--silver)}
.mark .g{width:28px;background:var(--gold)}
.brand h1{font-family:var(--display);font-size:15px;font-weight:600;margin:0;letter-spacing:.2px;line-height:1.25}
.brand .tag{font-size:11px;color:var(--muted-2);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px}

/* ---------- Mode switch ---------- */
.mode-switch{display:flex;background:var(--surface-2);border:1px solid var(--line);
  border-radius:11px;padding:4px;margin:0 6px 22px;gap:4px}
.mode-switch button{
  flex:1;border:0;background:transparent;color:var(--muted);
  font-family:var(--display);font-weight:600;font-size:12px;padding:9px 2px;
  border-radius:8px;cursor:pointer;transition:.18s;white-space:nowrap;
}
.mode-switch button.active{background:var(--lava);color:#fff;box-shadow:0 4px 14px rgba(255,74,46,.3)}
.mode-switch button:not(.active):hover{color:var(--text)}

/* ---------- Sidebar nav ---------- */
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.4px;
  color:var(--muted-2);margin:6px 10px 8px;font-family:var(--mono)}
.nav-item{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:0;cursor:pointer;
  background:transparent;color:var(--muted);padding:10px 10px;border-radius:9px;
  font-size:13.5px;font-family:var(--body);transition:.15s;line-height:1.3;
}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--surface-3);color:var(--text)}
.nav-num{font-family:var(--mono);font-size:11px;color:var(--muted-2);
  border:1px solid var(--line);border-radius:6px;padding:2px 5px;flex-shrink:0}
.nav-item.active .nav-num{color:var(--gold);border-color:var(--gold)}
.nav-item .nav-w{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--muted-2)}
.sidebar-foot{margin:24px 10px 4px;font-size:11px;color:var(--muted-2);line-height:1.5}

/* tier dots */
.tier-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tier-bronze{background:var(--bronze)} .tier-silver{background:var(--silver)} .tier-gold{background:var(--gold)}

/* ---------- Course content ---------- */
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--lava-soft);margin-bottom:10px;display:flex;gap:10px;align-items:center}
.eyebrow .w{color:var(--muted-2)}
h2.section-title{font-family:var(--display);font-size:30px;font-weight:600;margin:0 0 6px;letter-spacing:-.4px}
.section-sub{color:var(--muted);margin:0 0 26px;font-size:16px}

.lesson{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);
  padding:24px 26px;margin-bottom:18px;scroll-margin-top:20px}
.lesson > h3{font-family:var(--display);font-size:19px;font-weight:600;margin:0 0 14px;
  display:flex;align-items:center;gap:10px}
.lesson > h3::before{content:"";width:4px;height:18px;border-radius:3px;background:var(--lava)}
.lesson p{margin:0 0 12px}
.lesson ul,.lesson ol{margin:0 0 14px;padding-left:22px}
.lesson li{margin:5px 0}
.lesson h4{font-family:var(--display);font-size:14px;margin:0 0 6px}

.lesson pre{background:#0a0d11;border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px 16px;overflow-x:auto;margin:0 0 14px}
.lesson pre code{color:#cfd8e3;line-height:1.55;font-size:12.8px}
.lesson :not(pre) > code{background:var(--surface-3);border:1px solid var(--line);
  border-radius:5px;padding:1px 6px;color:#f0d8a8}

.callout{background:linear-gradient(180deg, rgba(255,74,46,.09), rgba(255,74,46,.03));
  border:1px solid rgba(255,74,46,.28);border-left:3px solid var(--lava);
  border-radius:var(--radius-sm);padding:13px 16px;margin:4px 0 14px;font-size:14px}

/* ---------- Demo / lab code example ---------- */
.demo{background:var(--surface-2);border:1px solid var(--line);border-left:3px solid var(--gold);
  border-radius:var(--radius-sm);padding:12px 15px 4px;margin:0 0 14px}
.demo > .demo-label{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);
  font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);margin:0 0 9px}
.demo > .demo-label::before{content:"\003C\002F\003E";font-weight:600;opacity:.8}
.demo p{margin:0 0 9px;font-size:14px}
.demo pre{margin:0 0 10px}
.demo .demo-note{font-size:12.8px;color:var(--muted);margin:0 0 10px;border-left:2px solid var(--line);padding-left:10px}

.tbl{width:100%;border-collapse:collapse;margin:0 0 14px;font-size:13.6px}
.tbl th,.tbl td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
.tbl th{background:var(--surface-3);font-family:var(--display);font-weight:600;font-size:13px}
.tbl tr:nth-child(even) td{background:rgba(255,255,255,.015)}

.cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 14px}
.mini-card{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px}
.mini-card h4{color:var(--gold);margin:0 0 6px;font-size:13.5px}
.mini-card p{font-size:13px;color:var(--muted);margin:0}

.medallion-row{display:flex;align-items:stretch;gap:8px;margin:0 0 14px;flex-wrap:wrap}
.med-tier{flex:1;min-width:140px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:14px;border-top:3px solid}
.med-tier.bronze{border-top-color:var(--bronze)}
.med-tier.silver{border-top-color:var(--silver)}
.med-tier.gold{border-top-color:var(--gold)}
.med-tier .badge{font-family:var(--display);font-weight:600;font-size:13px;display:block;margin-bottom:5px}
.med-tier.bronze .badge{color:var(--bronze)} .med-tier.silver .badge{color:var(--silver)} .med-tier.gold .badge{color:var(--gold)}
.med-tier p{font-size:12.5px;color:var(--muted);margin:0}
.med-arrow{display:flex;align-items:center;color:var(--muted-2);font-size:20px;font-family:var(--mono)}

/* ---------- Exam mode ---------- */
.exam-head{margin-bottom:24px}
.exam-head h2{font-family:var(--display);font-size:28px;font-weight:600;margin:0 0 6px;letter-spacing:-.3px}
.exam-head p{color:var(--muted);margin:0}

.setup{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:26px;margin-bottom:20px}
.setup h3{font-family:var(--display);margin:0 0 16px;font-size:17px}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.chip{border:1px solid var(--line);background:var(--surface-2);color:var(--text);
  border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;transition:.15s;font-size:13.5px}
.chip:hover{border-color:var(--muted)}
.chip.sel{border-color:var(--lava);background:rgba(255,74,46,.1)}
.chip .ck{font-family:var(--mono);font-size:11px;color:var(--muted-2);display:block;margin-top:3px}
.chip.sel .ck{color:var(--lava-soft)}

.field-row{display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px}
.field select{background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  border-radius:9px;padding:10px 12px;font-family:var(--body);font-size:14px;cursor:pointer}

.btn{font-family:var(--display);font-weight:600;border:0;border-radius:10px;padding:12px 22px;
  cursor:pointer;font-size:14.5px;transition:.16s}
.btn-primary{background:var(--lava);color:#fff;box-shadow:0 5px 18px rgba(255,74,46,.28)}
.btn-primary:hover{background:var(--lava-soft)}
.btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--muted)}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* progress bar (medallion smelt) */
.qprogress{height:6px;background:var(--surface-3);border-radius:4px;overflow:hidden;margin:0 0 4px}
.qprogress .fill{height:100%;background:linear-gradient(90deg,var(--bronze),var(--silver),var(--gold));transition:width .3s}
.qmeta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--muted-2);margin-bottom:18px}

.qcard{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:26px;margin-bottom:16px}
.qtag{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;
  color:var(--muted-2);border:1px solid var(--line);border-radius:6px;padding:3px 8px;margin-bottom:14px}
.qtext{font-family:var(--display);font-size:18px;font-weight:500;line-height:1.45;margin:0 0 20px}
.answers{display:flex;flex-direction:column;gap:10px}
.answer{display:flex;gap:13px;align-items:flex-start;border:1px solid var(--line);background:var(--surface-2);
  border-radius:11px;padding:13px 15px;cursor:pointer;transition:.14s;text-align:left;color:var(--text);font-size:14.5px;line-height:1.45}
.answer:hover{border-color:var(--muted)}
.answer .key{font-family:var(--mono);font-size:12px;color:var(--muted-2);border:1px solid var(--line);
  border-radius:6px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.answer.sel{border-color:var(--lava);background:rgba(255,74,46,.08)}
.answer.correct{border-color:var(--ok);background:rgba(63,207,142,.1)}
.answer.correct .key{border-color:var(--ok);color:var(--ok)}
.answer.wrong{border-color:var(--bad);background:rgba(255,95,109,.1)}
.answer.wrong .key{border-color:var(--bad);color:var(--bad)}
.answer.locked{cursor:default}

.explain{margin-top:18px;border-top:1px solid var(--line);padding-top:16px;display:none}
.explain.show{display:block}
.explain .verdict{font-family:var(--display);font-weight:600;font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.explain .verdict.ok{color:var(--ok)} .explain .verdict.no{color:var(--bad)}
.explain p{font-size:14px;color:var(--muted);margin:0 0 12px}
.review-link{display:inline-flex;align-items:center;gap:8px;font-family:var(--display);font-weight:600;
  font-size:13.5px;background:var(--surface-3);border:1px solid var(--line);color:var(--gold);
  border-radius:9px;padding:9px 14px;cursor:pointer;transition:.15s}
.review-link:hover{border-color:var(--gold);background:rgba(227,178,60,.08)}

.exam-nav{display:flex;justify-content:space-between;gap:12px;margin-top:18px}

/* results */
.result{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:34px;text-align:center}
.scorering{width:160px;height:160px;margin:6px auto 18px;position:relative}
.scorering svg{transform:rotate(-90deg)}
.scorering .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.scorering .pct b{font-family:var(--display);font-size:40px;line-height:1}
.scorering .pct span{font-family:var(--mono);font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:1px}
.result h2{font-family:var(--display);margin:0 0 6px;font-size:24px}
.verdict-line{color:var(--muted);margin:0 0 22px}
.bysec{text-align:left;margin:0 auto 24px;max-width:520px}
.bysec .row{display:flex;align-items:center;gap:12px;margin:9px 0;font-size:13.5px}
.bysec .row .nm{flex:1}
.bysec .bar{flex:1.4;height:8px;background:var(--surface-3);border-radius:4px;overflow:hidden}
.bysec .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--bronze),var(--gold))}
.bysec .sc{font-family:var(--mono);font-size:12px;color:var(--muted);width:46px;text-align:right}
.result .btn{margin:0 6px}

/* review jump highlight */
.lesson.flash{animation:flash 1.6s ease}
@keyframes flash{0%{box-shadow:0 0 0 2px var(--gold)}100%{box-shadow:0 0 0 0 transparent}}

/* mobile */
.topbar{display:none}
@media (max-width:880px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;z-index:40;width:84%;max-width:320px;left:-100%;transition:left .25s;box-shadow:0 0 60px rgba(0,0,0,.6)}
  .sidebar.open{left:0}
  .topbar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;
    background:var(--surface);border-bottom:1px solid var(--line);padding:12px 16px}
  .topbar .burger{background:var(--surface-2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;width:40px;height:40px;font-size:18px;cursor:pointer}
  .topbar .tb-title{font-family:var(--display);font-weight:600;font-size:15px}
  .content{padding:22px 16px}
  .cards-3{grid-template-columns:1fr}
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35}
  .scrim.show{display:block}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto}}

  </style>
</head>
<body>
  <div class="app">
    <!-- ===================== Sidebar ===================== -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <span class="b"></span>
          <span class="s"></span>
          <span class="g"></span>
        </div>
        <div>
          <h1>Databricks DEA</h1>
          <span class="tag">Data Engineer Associate</span>
        </div>
      </div>

      <div class="mode-switch">
        <button id="mode-course" type="button">Résumé</button>
        <button id="mode-full" type="button">Cours complet</button>
        <button id="mode-exam" type="button">Examen</button>
      </div>

      <nav id="nav-area"></nav>

      <div class="sidebar-foot">
        Entraînement non officiel basé sur l'Exam Guide (v. 4 mai 2026).<br />
        45 questions notées · 90 min · seuil ≈ 70 %.<br />
        Questions originales ; les 5 exemples officiels sont reproduits de l'Exam Guide.
      </div>
    </aside>

    <!-- ===================== Main ===================== -->
    <main class="main">
      <div class="topbar">
        <button class="burger" id="burger" type="button" aria-label="Ouvrir le menu">☰</button>
        <span class="tb-title" id="tb-title">Databricks DEA</span>
      </div>
      <div class="content" id="content"></div>
    </main>

    <div class="scrim" id="scrim"></div>
  </div>

  <!-- data.js doit être chargé AVANT app.js -->
  <script>
/* ============================================================
   Databricks Certified Data Engineer Associate — Trainer
   Données : contenu de cours + banque de questions
   Source : supports Databricks Academy (Lakeflow Connect, Lakeflow
   Jobs, Spark Declarative Pipelines, DevOps Essentials) + Exam Guide
   (version du 4 mai 2026). Questions rédigées de façon originale.
   ============================================================ */

const COURSE = [
  /* ------------------------------------------------------------------ */
  {
    id: "s1",
    num: "01",
    weight: 6,
    title: "Plateforme Data Intelligence",
    subtitle: "Architecture, Delta Lake, Unity Catalog et compute",
    tier: "bronze",
    lessons: [
      {
        id: "s1l1",
        title: "Architecture de la plateforme & Lakeflow",
        html: `
<p>La <strong>Databricks Data Intelligence Platform</strong> unifie l'ingénierie de données, l'analytique et l'IA sur une seule plateforme. Elle repose sur quatre couches :</p>
<ul>
  <li><strong>Stockage optimisé</strong> — Delta Lake (et Iceberg) sur le stockage objet cloud.</li>
  <li><strong>Gouvernance unifiée</strong> — Unity Catalog.</li>
  <li><strong>Moteur de traitement</strong> — Apache Spark + Structured Streaming, accéléré par <strong>Photon</strong>.</li>
  <li><strong>Lakeflow</strong> — la couche d'ingénierie de données unifiée.</li>
</ul>
<p><strong>Lakeflow</strong> se compose de trois piliers :</p>
<div class="cards-3">
  <div class="mini-card"><h4>Lakeflow Connect</h4><p>Connecteurs d'ingestion efficaces depuis des sources variées.</p></div>
  <div class="mini-card"><h4>Lakeflow Spark Declarative Pipelines</h4><p>Développement ETL accéléré (anciennement DLT).</p></div>
  <div class="mini-card"><h4>Lakeflow Jobs</h4><p>Orchestration fiable pour l'analytique et l'IA (anciennement Workflows).</p></div>
</div>
<div class="callout"><strong>À retenir :</strong> trois renommages clés pour l'examen — <em>DLT → Spark Declarative Pipelines</em>, <em>Workflows → Lakeflow Jobs</em>, <em>Databricks Asset Bundles → Declarative Automation Bundles</em>.</div>
`
      },
      {
        id: "s1l2",
        title: "Delta Lake",
        html: `
<p><strong>Delta Lake</strong> est un protocole open-source de lecture/écriture de fichiers sur le stockage cloud. Une table Delta est constituée de :</p>
<ul>
  <li>des fichiers de données au format <strong>Parquet</strong> (<code>...snappy.parquet</code>) dans un répertoire ;</li>
  <li>un journal de transactions <strong><code>_delta_log/</code></strong> contenant les métadonnées (<code>0000.json</code>, <code>0001.json</code>...).</li>
</ul>
<p>Fonctionnalités clés :</p>
<ul>
  <li><strong>Transactions ACID</strong> — fiabilité des écritures concurrentes.</li>
  <li><strong>Time Travel</strong> — interroger une version antérieure pour audit ou rollback (<code>VERSION AS OF</code> / <code>TIMESTAMP AS OF</code>).</li>
  <li><strong>Schema Enforcement & Evolution</strong> — validation et évolution contrôlée du schéma.</li>
  <li><strong>DML</strong> — <code>UPDATE</code>, <code>DELETE</code>, <code>MERGE INTO</code>.</li>
</ul>
<div class="callout"><strong>Question type :</strong> pour des rollbacks fiables, des pistes d'audit réglementaires et une source unique de vérité pour l'IA et la BI → <strong>Delta Lake (ACID + Time Travel) gouverné par Unity Catalog</strong>.</div>
`
      },
      {
        id: "s1l3",
        title: "Unity Catalog",
        html: `
<p><strong>Unity Catalog (UC)</strong> est la couche de gouvernance unifiée : contrôle d'accès, lignage (lineage), audit et découverte des données, partagés entre tous les workspaces d'une région via un <strong>metastore</strong>.</p>
<p>Hiérarchie des objets (namespace à trois niveaux) :</p>
<pre><code>metastore
└── catalog
    └── schema (database)
        └── table / view / volume / function / model</code></pre>
<p>Une table se référence par <code>catalog.schema.table</code>. UC gère aussi les <strong>Volumes</strong> (fichiers non tabulaires) et applique masquage de colonnes, sécurité au niveau ligne et politiques ABAC.</p>
`
      },
      {
        id: "s1l4",
        title: "Architecture Médaillon (Bronze / Silver / Gold)",
        html: `

        html: `
<p>Ce module présente <strong>Lakeflow Connect</strong> comme une solution <em>scalable</em> et <em>simplifiée</em> pour ingérer des données dans Databricks depuis une grande variété de sources.</p>
<p><strong>Objectifs d'apprentissage du cours :</strong></p>
<ul>
<li>Décrire Lakeflow Connect comme solution d'ingestion scalable et simplifiée depuis des sources variées.</li>
<li>Revoir les bénéfices des tables Delta et de l'architecture Médaillon.</li>
<li>Démontrer comment ingérer des données depuis le stockage objet cloud vers des tables Delta avec <code>CREATE TABLE AS</code>, <code>COPY INTO</code> et Auto Loader, y compris la <strong>capture des métadonnées de fichier</strong> dans les tables de la couche Bronze.</li>
<li>Expliquer comment les colonnes <em>rescued</em> servent à gérer les enregistrements malformés pendant l'ingestion.</li>
<li>Illustrer les techniques d'ingestion et d'<em>aplatissement</em> de données JSON semi-structurées depuis le stockage cloud.</li>
<li>Décrire les options d'ingestion depuis des systèmes d'entreprise via les <strong>Managed Connectors</strong> de Lakeflow Connect.</li>
<li>Discuter des méthodes d'ingestion alternatives : <code>MERGE INTO</code>, Delta Sharing et Databricks Marketplace.</li>
</ul>
<p><strong>Prérequis requis :</strong></p>
<ul>
<li><strong>Connaissance fondamentale de la plateforme Databricks</strong> — soit le cours « Get Started with Databricks for Data Engineering », soit une connaissance des Workspaces Databricks, d'Apache Spark, de Delta Lake et de l'architecture Médaillon, et des objets de données Unity Catalog.</li>
<li><strong>Expérience avec différents types de fichiers</strong> — Parquet, CSV, JSON, TXT, etc.</li>
<li><strong>Maîtrise de SQL / Python et des notebooks Databricks</strong> — coder en SQL et Python, et exécuter du code dans des notebooks.</li>
</ul>

<p><strong>Plan du cours (4 sections) :</strong> Introduction au Data Engineering dans Databricks ; Ingestion depuis le stockage cloud avec les <em>Standard Connectors</em> ; Ingestion de données d'entreprise avec les <em>Managed Connectors</em> ; Alternatives d'ingestion.</p>`

        id: "w1l2", title: "Le Data Engineering dans Databricks",
        html: `
<p>Databricks propose un <strong>data engineering unifié pour la Data Intelligence Platform</strong>, regroupé sous la marque <strong>Lakeflow</strong>. L'ensemble s'empile en couches, des fondations vers le haut :</p>
<table class="tbl">
<thead><tr><th>Couche</th><th>Rôle</th></tr></thead>
<tbody>
<tr><td><strong>Optimized Storage</strong></td><td>Stockage optimisé via <strong>Delta Lake</strong>, <strong>Parquet</strong> ou <strong>Iceberg</strong>.</td></tr>
<tr><td><strong>Unified Governance</strong></td><td>Gouvernance unifiée assurée par <strong>Unity Catalog</strong> : contrôle d'accès, audit, lignage, monitoring qualité, découverte — partagés entre workspaces.</td></tr>
<tr><td><strong>Data Processing Engine</strong></td><td>Moteur de traitement leader du marché : <strong>Apache Spark + Structured Streaming</strong>.</td></tr>
</tbody>
</table>
<p>Au-dessus de ces fondations, <strong>Lakeflow</strong> est la solution de data engineering de bout en bout. Elle expose trois composants complémentaires :</p>

<p>Avec les <strong>Standard Connectors</strong>, Lakeflow Connect propose trois approches, du retraitement complet au temps réel.</p>
<h4>1) Batch</h4>

<li>Le batch traditionnel <strong>retraite tous les enregistrements</strong> à chaque exécution (toutes les données sont ré-ingérées à chaque run du pipeline).</li>

        id: "w1l5", title: "Revue de Delta Lake & architecture Médaillon",
        html: `
<p><strong>Delta Lake</strong> est un <strong>protocole open-source</strong> de lecture et d'écriture de fichiers vers le stockage cloud. On y ingère des données depuis des sources variées, et il s'appuie sur des fichiers <strong>Parquet</strong> (et est compatible avec le format <strong>Iceberg</strong>). Les tables Delta offrent un <em>open table format</em> qui supporte l'architecture Lakehouse.</p>
<h4>Composants d'une table Delta</h4>
<p>Une table Delta est stockée comme un <strong>répertoire</strong> (<code>DeltaTableName/</code>) qui contient :</p>
<ul>
<li>les <strong>données</strong> sous forme de fichiers Parquet — par ex. <code>…282e.snappy.parquet</code>, <code>…432c.snappy.parquet</code> ;</li>
<li>un <strong>journal de transactions</strong> (transaction log) avec les métadonnées, dans le sous-dossier <code>_delta_log/</code> — fichiers <code>…0000.json</code>, <code>…0001.json</code>, <code>…0002.json</code>, etc.</li>
</ul>
<pre><code>DeltaTableName/
├── …282e.snappy.parquet      ← données
├── …432c.snappy.parquet
└── _delta_log/               ← transactions + métadonnées
    ├── 0000.json
    ├── 0001.json
    └── 0002.json</code></pre>
<p>Le transaction log introduit la notion d'<strong>états de table</strong> (table states) : chaque INSERT / UPDATE / DELETE ajoute une transaction (fichier de log), ce qui maintient la table à jour et permet des <strong>vues cohérentes</strong> ainsi que le <strong>voyage dans le temps</strong>. Sans Delta, modifier un fichier de data lake imposait de le recréer manuellement et de suivre les versions à la main.</p>
<h4>Fonctionnalités clés des tables Delta</h4>
<ul>
<li><strong>Transactions ACID</strong> — atomicité, cohérence, isolation, durabilité ; lectures/écritures concurrentes sans conflit.</li>
<li><strong>Time Travel</strong> — interroger et revenir à des versions antérieures (audit, recovery).</li>
<li><strong>DML</strong> — INSERT, UPDATE, DELETE, MERGE.</li>
<li><strong>Schema Evolution & Enforcement</strong> — évolution et application du schéma sans casser les workflows existants.</li>
<li>… et bien d'autres (batch + streaming unifiés, optimisation/performance, scalabilité). Delta Lake est <strong>open-source</strong>.</li>
</ul>
<h4>Architecture Médaillon (multi-hop)</h4>
<p>On améliore <strong>progressivement la structure et la qualité</strong> des données à mesure qu'elles traversent les couches :</p>
<div class="medallion-row">
<div class="med-tier bronze"><span class="badge">Bronze</span><p>Raw Data Ingestion — données brutes, non traitées, ingérées « as is ».</p></div>
<div class="med-arrow">→</div>
<div class="med-tier silver"><span class="badge">Silver</span><p>Cleaned Data — nettoyées, transformées, enrichies ; adaptées à l'analyse.</p></div>
<div class="med-arrow">→</div>
<div class="med-tier gold"><span class="badge">Gold</span><p>Business-Level Aggregates — curées, agrégées, haute qualité ; pour BI et analytique avancée.</p></div>
</div>
<p>Le traitement et la transformation peuvent se faire en <strong>batch</strong> ou en <strong>streaming</strong>. Les consommateurs en sortie : <strong>ML & IA</strong>, <strong>BI & Reporting</strong>, <strong>Streaming Analytics</strong>.</p>`

<p><code>CREATE TABLE AS</code> (CTAS) crée <strong>par défaut une table Delta</strong> à partir de fichiers du stockage objet cloud.</p>
<pre><code>CREATE TABLE new_table AS
SELECT *
FROM read_files(
  '&lt;path_to_file(s)&gt;',
  format =&gt; '&lt;file_type&gt;',
  &lt;other_format_specific_options&gt;
);</code></pre>
<p>La fonction <code>read_files()</code> lit les fichiers situés sous un emplacement fourni et renvoie les données sous <strong>forme tabulaire</strong>. Caractéristiques :</p>
<ul>
<li>Supporte la lecture des formats <strong>JSON, CSV, XML, TEXT, BINARYFILE, PARQUET, AVRO et ORC</strong>.</li>
<li>Peut <strong>détecter automatiquement le format</strong> du fichier et <strong>inférer un schéma unifié</strong> sur l'ensemble des fichiers.</li>
<li>Permet de spécifier des <strong>options propres au format</strong> source pour adapter la lecture.</li>
<li>Peut être utilisée dans des <strong>streaming tables</strong> pour ingérer de façon incrémentale des fichiers dans Delta Lake via <strong>Auto Loader</strong>.</li>
</ul>

        id: "w1l8", title: "Méthode 2 — COPY INTO (batch incrémental, legacy)",
        html: `
<p><code>COPY INTO</code> réalise une <strong>ingestion incrémentale</strong> (bulk load) depuis des fichiers du stockage cloud vers une table Delta existante, en deux temps.</p>
<h4>Étape 1 — créer une table pour recevoir les données</h4>
<ul>
<li>On peut créer une table <strong>sans schéma</strong> (il sera déduit), ou explicitement <strong>avec un schéma</strong>.</li>
</ul>
<h4>Étape 2 — copier de façon incrémentale</h4>
<pre><code>CREATE TABLE new_table;

COPY INTO new_table
FROM '&lt;dir_path&gt;'
FILEFORMAT = &lt;file_type&gt;
FORMAT_OPTIONS (&lt;options&gt;)
COPY_OPTIONS (&lt;options&gt;);</code></pre>
<ul>
<li>Opération <strong>idempotente et ré-essayable</strong> (<em>retriable</em>) : les fichiers <strong>déjà chargés sont ignorés</strong> → ingestion incrémentale, idéale quand l'emplacement cloud reçoit continuellement de nouveaux fichiers.</li>
<li>Supporte les types de fichiers courants : Parquet, JSON, XML, etc.</li>
<li><code>FROM</code> spécifie le chemin de l'emplacement cloud qui reçoit continuellement de nouveaux fichiers.</li>
<li><code>FORMAT_OPTIONS()</code> contrôle la façon dont les fichiers sources sont <strong>analysés et interprétés</strong> ; les options disponibles dépendent du format de fichier.</li>
<li><code>COPY_OPTIONS()</code> contrôle le comportement de l'opération <code>COPY INTO</code> elle-même — par ex. l'<strong>évolution de schéma</strong> (<code>mergeSchema</code>) et l'<strong>idempotence</strong> (<code>force</code>).</li>
</ul>
<div class="callout"><strong>Résumé d'usage :</strong> simple et répétable pour l'ingestion incrémentale de fichiers, parfait pour des jobs/pipelines planifiés. Désigné « legacy » : pour de gros volumes, Databricks recommande désormais <strong>Auto Loader + streaming tables</strong>.</div><div class="demo"><span class="demo-label">Exemple — notebook (SQL)</span><p>On crée une table avec un <strong>schéma explicite</strong> (ici 2 colonnes sur 3), puis on charge avec <code>COPY INTO</code> en autorisant l'évolution de schéma :</p><pre><code>DROP TABLE IF EXISTS historical_users_bronze_ci;

<p><strong>Auto Loader</strong> traite de façon <strong>incrémentale et efficace</strong> les nouveaux fichiers de données à mesure qu'ils arrivent dans le stockage cloud, <strong>sans configuration additionnelle</strong>. Il détecte et ingère automatiquement les nouveaux fichiers dans des tables Delta.</p>

<li>Fonctionne en <strong>batch ou en streaming</strong>.</li>
<li>Support <strong>Python et SQL</strong> (le SQL via Declarative Pipelines).</li>
<li>Peut traiter des <strong>milliards de fichiers</strong> (built to scale).</li>
<li>Construit sur <strong>Spark Structured Streaming</strong>.</li>
</ul>
<h4>Auto Loader en Python</h4>
<pre><code>(spark.readStream
  .format("cloudFiles")
  .option("cloudFiles.format", "json")
  .option("cloudFiles.schemaLocation", "&lt;checkpoint_path&gt;")
  .load("/Volumes/catalog/schema/files")
.writeStream
  .option("checkpointLocation", "&lt;checkpoint_path&gt;")

)</code></pre>
<p>Points clés du code : le format spécial <code>cloudFiles</code> (active Auto Loader), le <code>cloudFiles.schemaLocation</code> (où Auto Loader mémorise/fait évoluer le schéma), le <code>checkpointLocation</code> (suivi des fichiers déjà lus + état/progression), et le <code>trigger</code> qui fixe le rythme des micro-batchs. <code>.toTable()</code> écrit dans la table Delta cible.</p>
<h4>Auto Loader en SQL (Declarative Pipelines)</h4>
<pre><code>CREATE OR REFRESH STREAMING TABLE catalog.schema.table

);</code></pre>

<p>Les métadonnées courantes accessibles depuis les fichiers d'entrée :</p>
<table class="tbl">
<thead><tr><th>Champ</th><th>Contenu</th><th>Exemple</th></tr></thead>
<tbody>
<tr><td><code>_metadata.file_name</code></td><td>Nom du fichier d'entrée</td><td><code>part-00002-7573-1-c000…</code></td></tr>
<tr><td><code>_metadata.file_modification_time</code></td><td>Horodatage de dernière modification du fichier</td><td><code>2024-10-07T18:04:42.885+00:00</code></td></tr>
</tbody>
</table>
<pre><code>SELECT
  *,
  _metadata.file_name              AS source,
  _metadata.file_modification_time AS last_mod_time
FROM read_files('&lt;dir_path&gt;', format =&gt; 'csv');</code></pre>
<p>Doc : <code>docs.databricks.com/.../ingestion/file-metadata-column</code></p><div class="demo"><span class="demo-label">Exemple — notebook (SQL)</span><p>Ingestion enrichie : conversion d'un timestamp Unix en <code>DATE</code>, ajout des métadonnées fichier et de l'horodatage d'ingestion :</p><pre><code>DROP TABLE IF EXISTS historical_users_bronze;

CREATE TABLE historical_users_bronze AS
SELECT
  *,
  cast(from_unixtime(user_first_touch_timestamp / 1000000) AS DATE) AS first_touch_date,
  _metadata.file_modification_time AS file_modification_time,  -- dernière modif du fichier source
  _metadata.file_name              AS source_file,             -- nom du fichier source
  current_timestamp()              AS ingestion_time           -- horodatage d'ingestion
FROM read_files(
  '/Volumes/dbacademy_ecommerce/v01/raw/users-historical',
  format =&gt; 'parquet'
);

SELECT * FROM historical_users_bronze LIMIT 10;</code></pre></div>`

        id: "w1l12", title: "La colonne _rescued_data (lignes malformées)",
        html: `
<p><code>read_files()</code>, <code>spark.read</code> et Auto Loader fournissent une <strong>colonne <code>_rescued_data</code></strong> lorsque les données brutes ne correspondent pas au schéma attendu. Au lieu de <strong>perdre la ligne</strong> ou de faire échouer l'ingestion, la donnée problématique est « secourue » (rescued).</p>
<p>La valeur non conforme est <strong>rescued dans la colonne <code>_rescued_data</code> sous forme de chaîne au format JSON</strong>, contenant la valeur et le chemin du fichier source (<code>_file_path</code>). Schéma de principe :</p>
<pre><code>… | _rescued_data
…   {"column": "&lt;data&gt;", "_file_path": "&lt;file_path&gt;"}
…   null</code></pre>
<h4>Exemple concret</h4>
<p>La colonne <code>users</code> est lue en <strong>STRING</strong>, la colonne <code>cost</code> en <strong>BIGINT</strong>. Un fichier contient la valeur <code>$100</code> (une chaîne) pour Peter et <code>300</code> pour Zebi :</p>
<table class="tbl">
<thead><tr><th>users (STRING)</th><th>cost (BIGINT)</th><th>_rescued_data</th></tr></thead>
<tbody>
<tr><td>peter</td><td>null</td><td><code>{"cost":"$100","_file_path":"…"}</code></td></tr>
<tr><td>zebi</td><td>300</td><td>null</td></tr>
</tbody>
</table>
<ul>
<li><code>$100</code> n'est pas un BIGINT valide → la valeur est placée dans <code>_rescued_data</code> (JSON) et <code>cost</code> passe à <code>null</code> pour cette ligne.</li>
<li>Pour la ligne valide (<code>300</code>, conforme au type), <code>_rescued_data</code> vaut <code>null</code>.</li>
</ul>
<div class="callout"><strong>À retenir :</strong> <code>_rescued_data</code> = filet de sécurité contre la perte de données. Les champs qui ne matchent pas le schéma ne sont pas droppés, ils sont capturés en JSON.</div><div class="demo"><span class="demo-label">Exemple — schéma explicite + _rescued_data</span><p>Définir un schéma explicite accélère la lecture (pas d'inférence) et fiabilise le parsing. La colonne <code>_rescued_data</code> est créée via l'option <code>rescueddatacolumn</code> :</p><pre><code>SELECT *
FROM read_files(
  DA.paths_working_dir || '/csv_demo_files/malformed_example_1_data.csv',
  format =&gt; 'csv',
  sep    =&gt; '|',
  header =&gt; true,
  schema =&gt; '''
      order_id INT,
      email STRING,
      transactions_timestamp BIGINT''',
  rescueddatacolumn =&gt; '_rescued_data'   -- crée la colonne _rescued_data
);</code></pre><p class="demo-note">La colonne <code>_rescued_data</code> capture toute donnée non parsée pour 3 raisons : <strong>colonne absente</strong> du schéma, <strong>type mismatch</strong>, ou <strong>case mismatch</strong> (casse différente).</p><p>Sans schéma, les colonnes inconnues atterrissent dans <code>_rescued_data</code> sous les clés <code>_c0</code>, <code>_c1</code>… qu'on peut récupérer et caster :</p><pre><code>SELECT
  cast(_rescued_data:_c0 AS BIGINT) AS order_id,
  *
FROM read_files(
  DA.paths_working_dir || '/csv_demo_files/malformed_example_2_data.csv',
  format =&gt; 'csv', sep =&gt; '|', header =&gt; true
);</code></pre></div><div class="demo"><span class="demo-label">Lab (challenge) — nettoyer _rescued_data</span><p>Récupérer une valeur secourue (prix au format <code>$xx</code>), la nettoyer et la recaster en numérique avec <code>coalesce()</code> + <code>replace()</code> :</p><pre><code>DROP TABLE IF EXISTS 05_lab_challenge;

CREATE TABLE 05_lab_challenge AS
SELECT
  item_id,
  name,
  price,
  cast(coalesce(price, replace(_rescued_data:price,'$','')) AS double) AS price_fixed,
  _rescued_data,
  _metadata.file_modification_time AS file_modification_time,
  _metadata.file_name              AS source_file,
  current_timestamp()              AS ingestion_timestamp
FROM read_files(
  DA.paths_working_dir || '/csv_demo_files/lab_malformed_data.csv',
  format =&gt; 'csv', sep =&gt; ',', header =&gt; true,
  schema =&gt; 'item_id STRING, name STRING, price DOUBLE',
  rescueddatacolumn =&gt; '_rescued_data'
);</code></pre></div>`

        id: "w1l13", title: "Ingestion de JSON semi-structuré",
        html: `
<p>Ingérer du semi-structuré (JSON) est courant pour les données d'événements, les logs ou les données d'API. L'objectif : parser et transformer ce JSON, potentiellement <strong>imbriqué</strong>, en tables Delta structurées.</p>
<h4>Rappel sur le JSON</h4>
<ul>
<li>Les <strong>objets</strong> JSON sont délimités par des accolades <code>{ }</code>.</li>
<li>Les <strong>clés</strong> sont toujours des chaînes entre guillemets.</li>
<li>Les <strong>valeurs</strong> peuvent être : String, Number, Boolean, Array, Object — ou <code>null</code>. Les objets peuvent être <em>plats</em> ou <em>imbriqués</em>.</li>
</ul>
<pre><code>{
  "name": "John Doe",
  "age": 35,
  "address": { "city": "Anytown", "state": "CA" },
  "children": [
    { "name": "Owen", "age": 10 },
    { "name": "Eva",  "age": 8 }
  ]
}</code></pre>
<h4>Trois façons de manipuler du JSON selon le type de colonne</h4>
<table class="tbl">
<thead><tr><th>Type</th><th>Caractéristiques</th></tr></thead>
<tbody>
<tr><td><strong>1. STRING</strong></td><td>Le JSON est stocké comme une simple chaîne ; peut contenir n'importe quel JSON sans contrainte ; <strong>le moins performant</strong>. Accès aux sous-champs avec la <strong>syntaxe deux-points</strong> <code>:</code>.</td></tr>
<tr><td><strong>2. STRUCT</strong></td><td>Le JSON est parsé en type STRUCT avec un <strong>schéma défini</strong> ; le STRUCT <strong>applique le schéma</strong> ; <strong>plus efficace</strong> en requête qu'une chaîne JSON.</td></tr>
<tr><td><strong>3. VARIANT</strong></td><td>Peut stocker tout type de données, y compris du JSON ; idéal pour le semi-structuré ; <strong>très flexible</strong> (s'adapte sans schéma rigide) et <strong>meilleures performances</strong> que les méthodes existantes. <em>(Public Preview à partir du Q2 2025.)</em></td></tr>
</tbody>
</table>
<h4>Accès aux sous-champs d'une colonne JSON STRING (syntaxe deux-points)</h4>
<pre><code>SELECT json_column:name             -- → John Doe
SELECT json_column:address:city     -- → Anytown</code></pre>
<h4>Correspondance des types JSON → types SQL Databricks</h4>
<table class="tbl">
<thead><tr><th>Type JSON</th><th>Type SQL Databricks</th></tr></thead>
<tbody>
<tr><td>String</td><td>STRING</td></tr>
<tr><td>Number</td><td>INT / FLOAT / DOUBLE</td></tr>
<tr><td>Boolean</td><td>BOOLEAN</td></tr>
<tr><td>Object</td><td>STRUCT&lt;&gt;</td></tr>
<tr><td>Array</td><td>ARRAY&lt;&gt;</td></tr>
</tbody>
</table>
<h4>Convertir une chaîne JSON en STRUCT</h4>
<p>On définit un schéma STRUCT correspondant à la structure du JSON. La clé <code>address</code> (objet) devient un <code>STRUCT&lt;city, state&gt;</code> et la clé <code>children</code> (tableau d'objets) un <code>ARRAY&lt;STRUCT&lt;name, age&gt;&gt;</code> :</p>
<pre><code>STRUCT&lt;
  name: STRING,
  age: INT,
  address: STRUCT&lt;city: STRING, state: STRING&gt;,
  children: ARRAY&lt;STRUCT&lt;name: STRING, age: INT&gt;&gt;
&gt;</code></pre>
<p>Deux fonctions clés, en deux étapes :</p>
<pre><code>-- 1) Déduire automatiquement le schéma d'un exemple de chaîne JSON
SELECT schema_of_json('sample-json-string');

-- 2) Convertir une colonne JSON en colonne STRUCT à partir du schéma obtenu
SELECT from_json(json_col, 'json-struct-schema') AS struct_column
FROM table;</code></pre>
<div class="callout"><strong>Question type :</strong> « accéder à un sous-champ d'une colonne JSON stockée en STRING » → syntaxe <strong>deux-points</strong> (<code>col:champ:sous_champ</code>). « Convertir une colonne JSON STRING en colonne typée » → <code>schema_of_json()</code> puis <code>from_json()</code>.</div><div class="demo"><span class="demo-label">Exemple complet — JSON Kafka (notebook)</span><p><strong>1) Bronze brut</strong> — ingérer les fichiers JSON tels quels :</p><pre><code>DROP TABLE IF EXISTS kafka_events_bronze_raw;

CREATE TABLE kafka_events_bronze_raw AS
SELECT *
FROM read_files(
  '/Volumes/dbacademy_ecommerce/v01/raw/events-kafka',
  format =&gt; 'json'
);</code></pre><p><strong>2) Décoder du base64</strong> — <code>unbase64()</code> renvoie du BINARY, qu'on caste en STRING. La <code>value</code> décodée est une chaîne JSON :</p><pre><code>CREATE OR REPLACE TABLE kafka_events_bronze_decoded AS
SELECT
  cast(unbase64(key)   AS STRING) AS decoded_key,
  offset, partition, timestamp, topic,
  cast(unbase64(value) AS STRING) AS decoded_value   -- chaîne JSON
FROM kafka_events_bronze_raw;</code></pre><p><strong>3a) Aplatir via la syntaxe deux-points</strong> (colonne STRING, simple et flexible mais moins performante) :</p><pre><code>SELECT
  decoded_value:device,           -- STRING
  decoded_value:traffic_source,   -- STRING
  decoded_value:geo,              -- STRING contenant un JSON
  decoded_value:items             -- STRING contenant un array JSON
FROM kafka_events_bronze_decoded;</code></pre><p><strong>3b) Aplatir via conversion STRUCT</strong> (schéma appliqué, plus performant). Étape 1 : déduire le schéma ; étape 2 : <code>from_json()</code> :</p><pre><code>-- 1) Déduire le schéma à partir d'un exemple de ligne
SELECT schema_of_json('{"device":"Linux","ecommerce":{"purchase_revenue_in_usd":1075.5,"total_item_quantity":1,"unique_items":1},"event_name":"finalize","geo":{"city":"Houston","state":"TX"},"items":[{"coupon":"NEWBED10","item_id":"M_STAN_K","item_name":"Standard King Mattress","price_in_usd":1195.0,"quantity":1}],"traffic_source":"email","user_id":"UA000000106116176"}') AS schema;

-- 2) Convertir la colonne JSON en STRUCT avec le schéma obtenu
CREATE OR REPLACE TABLE kafka_events_bronze_struct AS
SELECT
  * EXCEPT (decoded_value),
  from_json(
    decoded_value,
    'STRUCT&lt;device: STRING, ecommerce: STRUCT&lt;purchase_revenue_in_usd: DOUBLE, total_item_quantity: BIGINT, unique_items: BIGINT&gt;, event_name: STRING, geo: STRUCT&lt;city: STRING, state: STRING&gt;, items: ARRAY&lt;STRUCT&lt;coupon: STRING, item_id: STRING, item_name: STRING, price_in_usd: DOUBLE, quantity: BIGINT&gt;&gt;, traffic_source: STRING, user_id: STRING&gt;'
  ) AS value
FROM kafka_events_bronze_decoded;</code></pre><p><strong>4) Extraire champs, champs imbriqués et tableaux</strong> avec la notation point :</p><pre><code>SELECT
  decoded_key,
  value.device          AS device,                 -- champ
  value.geo.city        AS city,                    -- champ imbriqué
  value.items           AS items,
  array_size(value.items) AS number_elements_in_array
FROM kafka_events_bronze_struct
ORDER BY number_elements_in_array DESC;</code></pre><p><strong>5) Exploser un tableau</strong> — <code>explode()</code> crée une ligne par élément. (<code>explode_outer()</code> renvoie une ligne avec NULL si le tableau est NULL, là où <code>explode()</code> n'en produit aucune.)</p><pre><code>CREATE OR REPLACE TABLE bronze_explode_array AS
SELECT
  decoded_key,
  array_size(value.items) AS number_elements_in_array,
  explode(value.items)    AS item_in_array,   -- 1 ligne par élément
  value.items
FROM kafka_events_bronze_struct
ORDER BY number_elements_in_array DESC;</code></pre></div><div class="demo"><span class="demo-label">Exemple — VARIANT (Public Preview Q2 2025)</span><p>Le type <strong>VARIANT</strong> stocke n'importe quel semi-structuré, sans schéma figé, avec de meilleures performances. <code>parse_json()</code> convertit une chaîne JSON en VARIANT :</p><pre><code>CREATE OR REPLACE TABLE kafka_events_bronze_variant AS
SELECT
  decoded_key, offset, partition, timestamp, topic,
  parse_json(decoded_value) AS json_variant_value   -- chaîne JSON -&gt; VARIANT
FROM kafka_events_bronze_decoded;

-- On parse ensuite avec la syntaxe deux-points et on caste
SELECT
  json_variant_value,
  json_variant_value:device :: STRING,   -- extrait device et caste en STRING
  json_variant_value:items
FROM kafka_events_bronze_variant
LIMIT 10;</code></pre><p class="demo-note">VARIANT ne fonctionne pas sur Serverless Version 1. Ouvert (open-source), flexible, performant.</p></div><div class="demo"><span class="demo-label">Lab — flatten JSON (3 solutions)</span><p>Ingestion brute avec schéma + <code>_rescued_data</code>, puis aplatissement via STRUCT :</p><pre><code>-- Bronze brut + décodage
CREATE OR REPLACE TABLE lab7_lab_kafka_events_raw AS
SELECT
  *,
  cast(unbase64(value) AS STRING) AS decoded_value
FROM read_files(
  DA.paths_working_dir || '/json_demo_files/lab_kafka_events.json',
  format =&gt; 'json',
  schema =&gt; '''key STRING, timestamp DOUBLE, value STRING''',
  rescueddatacolumn =&gt; '_rescued_data'
);

-- Solution STRUCT : from_json + projection des champs
CREATE OR REPLACE TABLE lab7_flattened AS
SELECT key, timestamp,
  value1.user_id        AS user_id,
  value1.event_type     AS event_type,
  value1.event_timestamp AS event_timestamp,
  value1.items          AS items
FROM (
  SELECT * EXCEPT(decoded_value),
    from_json(decoded_value,
      'STRUCT&lt;event_timestamp: TIMESTAMP, event_type: STRING, items: ARRAY&lt;STRUCT&lt;item_id: STRING, price_usd: DOUBLE, quantity: BIGINT&gt;&gt;, user_id: STRING&gt;') AS value1
  FROM lab7_lab_kafka_events_raw
);</code></pre><p class="demo-note">Trois techniques possibles au choix : syntaxe deux-points (le plus simple), conversion VARIANT (<code>parse_json</code>), ou conversion STRUCT (<code>schema_of_json</code> + <code>from_json</code>).</p></div>`

        id: "w1l14", title: "Connecteurs managés (données d'entreprise)",
        html: `
<p>Au-delà du stockage cloud (CTAS, COPY INTO, Auto Loader), il reste à répondre à la question « <em>et pour ingérer depuis les bases de données et applications d'entreprise ?</em> ». C'est le rôle des <strong>Managed Connectors</strong> de Lakeflow Connect.</p>
<h4>Bénéfices des Managed Connectors</h4>
<ul>
<li>Simplifient l'ingestion depuis une large variété de <strong>bases de données et applications d'entreprise</strong> (Salesforce, Workday, PostgreSQL, SQL Server, Dynamics 365, ServiceNow, Google Analytics, NetSuite, SharePoint…).</li>
<li>Offrent une <strong>interface « point and click »</strong> (ou une API).</li>
<li><strong>Entièrement managés par Databricks</strong> → moins de configuration manuelle et de code custom. Les connecteurs managés existent dans différents états de disponibilité (release states : Public Preview, GA…).</li>
</ul>
<h4>Ingestion SaaS (applications)</h4>
<p>Lakeflow Connect collecte les données depuis des sources externes vers des <strong>Streaming Delta Tables</strong> via un pipeline <strong>Serverless Declarative</strong> :</p>
<ol>
<li>Un job <em>Serverless Declarative Pipelines</em> récupère les <strong>credentials depuis Unity Catalog</strong>.</li>
<li>Le job atteint la source de données publiquement accessible (API, port OLAP ouvert, etc.).</li>
<li>Le service transforme les données et les stocke dans une <strong>Streaming Delta Table</strong>.</li>
</ol>
<p>Pour les connecteurs SaaS, tout le mouvement de données se fait dans le <em>data plane</em> ; le <em>control plane</em> ne sert qu'au setup, au monitoring (event logs) et à la gestion.</p>
<h4>Ingestion base de données</h4>
<p>Architecture similaire, mais depuis des bases externes (on-prem ou cloud), avec deux éléments supplémentaires :</p>
<ol>
<li>Une <strong>Ingestion Gateway</strong> (pipeline Declarative sur <em>compute classique</em>) récupère les credentials depuis Unity Catalog.</li>
<li>Elle se connecte avec ces credentials et collecte les données depuis les sources base de données.</li>
<li>L'état le plus récent et les données de <em>staging</em> (métadonnées, snapshots, change logs) sont sauvegardés dans un <strong>volume Unity Catalog</strong> (couche de staging intermédiaire, sécurisée par UC).</li>
<li>Un job <em>Serverless Declarative Pipelines</em> traite les données collectées vers les <strong>Streaming Delta Tables</strong>.</li>
</ol>
<div class="callout"><strong>Pourquoi une Gateway ?</strong> (1) <strong>Réseau</strong> : beaucoup de bases sont derrière un firewall / non exposées à Internet ; la gateway peut être déployée dans votre réseau. (2) <strong>Charge</strong> : une seule gateway parle à la base puis « fan-out » vers N pipelines, limitant le nombre de connexions directes à la source.</div>
<div class="callout"><strong>Partner Connect :</strong> s'il n'existe pas de Managed Connector pour votre source, vous pouvez utiliser un riche écosystème de partenaires (Informatica, Qlik, Rivery, Alteryx, Prophecy, Fivetran…) — comptes d'essai et connexion depuis l'UI Databricks.</div>`

      {
        id: "w1l15", title: "Alternatives d'ingestion (bonus)",
        html: `
<h4>Fonctionnalités hors périmètre détaillé du cours, mais à connaître</h4>
<div class="cards-3">
<div class="mini-card"><h4>Delta Sharing</h4><p>Partager des données de façon sécurisée entre plateformes, clouds et régions.</p></div>
<div class="mini-card"><h4>Lakehouse Federation</h4><p>Interroger des sources externes <em>sans déplacer</em> les données. Utile pour : reporting ad hoc, PoC, phase exploratoire de nouveaux pipelines/rapports, support des charges pendant une migration incrémentale.</p></div>
<div class="mini-card"><h4>Zerobus (à venir)</h4><p>API Lakeflow Connect : écrire des événements directement dans le lakehouse à <strong>très haut débit (100 Mo/s)</strong> et <strong>latence quasi temps réel (&lt;5 s)</strong> — IoT, clickstream, télémétrie.</p></div>
</div>
<h4>Databricks Marketplace</h4>
<p>Place de marché ouverte pour tous les <strong>data products</strong> : datasets, notebooks, dashboards, modèles ML, solution accelerators. <strong>Propulsée par Delta Sharing.</strong> En 3 étapes : ouvrir le Marketplace dans le workspace → rechercher des assets → <em>Get instant access</em>.</p>
<h4>Ingérer dans des tables Delta existantes : MERGE INTO</h4>
<p><code>MERGE INTO</code> fusionne un ensemble de mises à jour, insertions et suppressions depuis une table <strong>source</strong> vers une table Delta <strong>cible</strong>, en <strong>une seule opération atomique</strong>. Il supporte l'<strong>application</strong> ou l'<strong>évolution</strong> de schéma, et permet des actions différentes selon l'appariement :</p>
<ul>
<li><strong>Lignes appariées (matched) :</strong> <code>UPDATE</code> ou <code>DELETE</code> ;</li>
<li><strong>Lignes non appariées par la cible (not matched) :</strong> <code>INSERT</code> ;</li>
<li><strong>Lignes non appariées par la source (not matched by source) :</strong> <code>UPDATE</code> ou <code>DELETE</code>.</li>
</ul>
<p>Cela rend <code>MERGE INTO</code> idéal pour les <strong>dimensions à variation lente (SCD Type 1)</strong>, les <strong>chargements incrémentaux</strong> et les scénarios complexes de <strong>change data capture (CDC)</strong>.</p>
<pre><code>MERGE INTO target_table target
USING source_table source
ON target.id = source.id
WHEN MATCHED AND source.status = 'update' THEN
  UPDATE SET
    target.email  = source.email,
    target.status = source.status
WHEN MATCHED AND source.status = 'delete' THEN
  DELETE
WHEN NOT MATCHED THEN
  INSERT (id, first_name, email, sign_up_date, status)
  VALUES (source.id, source.first_name, source.email, source.sign_up_date, source.status);</code></pre>
<p>Mécanique : <code>MERGE INTO … target</code> déclare la cible (alias <code>target</code>) ; <code>USING … source</code> déclare la source (alias <code>source</code>) ; <code>ON</code> fixe la <strong>condition de fusion</strong> (souvent une clé unique <code>id</code>) ; puis on enchaîne les clauses <code>WHEN MATCHED …</code> (UPDATE/DELETE selon le statut) et <code>WHEN NOT MATCHED THEN INSERT …</code> pour insérer les nouvelles lignes.</p>
<div class="callout"><strong>Question type :</strong> « appliquer en une opération atomique des updates + inserts + deletes pour du CDC ou du SCD Type 1 » → <strong>MERGE INTO</strong>. « Partager des données entre régions/clouds sans copie propriétaire » → <strong>Delta Sharing</strong>. « Requêter une base externe sans la migrer » → <strong>Lakehouse Federation</strong>.</div><div class="demo"><span class="demo-label">Exemple — MERGE WITH SCHEMA EVOLUTION</span><p>Quand la table <strong>source</strong> possède une colonne absente de la <strong>cible</strong> (ici <code>country</code>), <code>MERGE WITH SCHEMA EVOLUTION INTO</code> fait évoluer automatiquement le schéma de la cible :</p><pre><code>MERGE WITH SCHEMA EVOLUTION INTO main_users_target target
USING new_users_source source
ON target.id = source.id
WHEN MATCHED AND source.status = 'update' THEN
  UPDATE SET
    target.email  = source.email,
    target.status = source.status
WHEN MATCHED AND source.status = 'delete' THEN
  DELETE

<h4>Pourquoi c'est difficile</h4>
<p>Construire et opérer des pipelines de données fiables demande de gérer une multitude de préoccupations en plus de la logique de transformation : <strong>gestion des dépendances, calcul des partitions, checkpointing & retries, gestion des backfills, contrôles qualité, gouvernance, découverte des données, version control, déploiement, infrastructure…</strong></p>
<p>Conséquences typiques :</p>
<ul>
<li><strong>Développement laborieux</strong> et pipelines lents/sources d'erreurs → retarde les produits data et l'impact métier.</li>
<li><strong>Complexité opérationnelle</strong> → coûts élevés, downtime, gaspillage de ressources.</li>
<li><strong>Batch et streaming en silos</strong> → flexibilité limitée, difficile et coûteux de s'adapter aux besoins de latence/coût/SLA.</li>

<h4>Ce qu'apporte SDP — « Reliable data pipelines made easy »</h4>

<li><strong>Authoring simplifié :</strong> on déclare ingestion et transformations en SQL ou Python, et SDP gère le reste.</li>

        html: `
<p>SDP manipule trois types de datasets selon la façon de traiter les données.</p>
<h4>STREAMING TABLE (ST)</h4>
<ul>
<li>Table supportant le traitement <strong>incrémental ou streaming</strong> (<strong>exactly-once</strong> : chaque fichier lu une seule fois).</li>
<li>À chaque rafraîchissement, les données ajoutées aux tables sources sont <strong>appendées</strong> à la streaming table.</li>
<li>Code SQL : <code>CREATE OR REFRESH STREAMING TABLE</code>.</li>
<li>En SQL, utiliser <code>FROM STREAM read_files()</code> pour invoquer Auto Loader (lectures streaming incrémentales + checkpoints).</li>
</ul>
<h4>MATERIALIZED VIEW (MV)</h4>
<ul>
<li>À chaque mise à jour, les résultats de la requête sont <strong>recalculés</strong> pour refléter les changements des datasets amont.</li>
<li>Créée et tenue à jour par le pipeline ; syntaxe <code>CREATE OR REFRESH MATERIALIZED VIEW</code>.</li>
<li>Utilisable <strong>partout</strong> dans le pipeline (pas seulement en Gold).</li>
<li>Quand c'est possible, les résultats sont <strong>rafraîchis de façon incrémentale</strong> (évite la reconstruction complète à l'arrivée de nouvelles données) — <strong>Serverless uniquement</strong>, via un optimiseur basé sur les coûts.</li>
<li>Sert aux transformations, agrégations, pré-calcul de requêtes lentes, calculs fréquents.</li>
</ul>
<h4>VIEW & TEMPORARY VIEW</h4>
<ul>
<li>Construisent une <strong>table virtuelle sans données physiques</strong>, basée sur la requête.</li>
<li><strong>TEMPORARY VIEW :</strong> persiste seulement sur la durée de vie du pipeline, privée au pipeline, <strong>non enregistrée dans Unity Catalog</strong> ; utile comme requête intermédiaire non exposée aux utilisateurs finaux. Syntaxe <code>CREATE TEMPORARY VIEW</code>.</li>
<li><strong>VIEW :</strong> <strong>enregistrée comme objet dans Unity Catalog</strong> ; syntaxe <code>CREATE VIEW</code>. <em>Limitations :</em> le pipeline doit être un pipeline UC ; les views ne peuvent pas avoir de requêtes streaming ni servir de source streaming.</li>
</ul>
<div class="callout"><strong>Renommages depuis DLT</strong> (l'ancienne syntaxe reste supportée par compatibilité) :<br/>
<code>CREATE OR REFRESH STREAMING LIVE TABLE</code> → <code>CREATE OR REFRESH STREAMING TABLE</code><br/>
<code>CREATE OR REFRESH LIVE TABLE</code> → <code>CREATE OR REFRESH MATERIALIZED VIEW</code><br/>
<code>CREATE LIVE VIEW</code> / <code>CREATE TEMPORARY LIVE VIEW</code> → <code>CREATE VIEW</code> / <code>CREATE TEMPORARY VIEW</code></div>`

<pre><code>CONSTRAINT &lt;constraint-name&gt; EXPECT (&lt;column condition&gt;) [ON VIOLATION &lt;action&gt;]</code></pre>
<table class="tbl">
<thead><tr><th>Action</th><th>Exemple</th><th>Résultat</th></tr></thead>
<tbody>
<tr><td><strong>WARN</strong> (défaut)</td><td><code>CONSTRAINT valid_notification EXPECT (notifications IN ('Y','N'))</code></td><td>Les lignes invalides sont <strong>quand même écrites</strong> dans la cible ; les logs incluent le compte de valides vs invalides et d'autres métriques.</td></tr>
<tr><td><strong>DROP</strong></td><td><code>CONSTRAINT valid_date EXPECT (order_timestamp &gt; "2021-01-01") ON VIOLATION DROP ROW</code></td><td>Les lignes invalides sont <strong>supprimées</strong> de la table ; le compte est journalisé avec les autres métriques.</td></tr>
<tr><td><strong>FAIL</strong></td><td><code>CONSTRAINT valid_id EXPECT (customer_id IS NOT NULL) ON VIOLATION FAIL UPDATE</code></td><td>Provoque l'<strong>échec du flow</strong> concerné (sans faire échouer les autres flows du pipeline) ; <strong>intervention manuelle</strong> requise.</td></tr>
</tbody>

<li>Objectif : prendre <strong>toutes les lignes de deux streaming tables</strong> et les joindre à chaque exécution du pipeline.</li>

<h4>Qu'est-ce que le CDC ?</h4>
<p>Le <strong>Change Data Capture (CDC)</strong> est une technique pour <strong>suivre et capturer les changements</strong> dans une source (base de données, lakehouse, data warehouse) — <strong>INSERTS, UPDATES, DELETES</strong> — puis appliquer ces changements dans le lakehouse/data warehouse. La table source des changements doit actuellement être une <strong>streaming table</strong> ; la table cible reçoit les changements appliqués.</p>
<p>Le CDC se catégorise en types de <strong>Slowly Changing Dimensions (SCD)</strong> selon la gestion de l'historique.</p>
<h4>SCD Type 1 (écrasement)</h4>
<ul>
<li>Quand un enregistrement est mis à jour, l'ancien est <strong>simplement écrasé</strong> par sa clé avec la nouvelle valeur.</li>
<li>Quand un enregistrement est supprimé par sa clé, la ligne est <strong>retirée</strong>.</li>
<li><strong>Aucun suivi des anciennes valeurs</strong> : seule la donnée courante est conservée.</li>
<li>À utiliser quand seul l'<strong>état actuel</strong> compte et que l'historique est sans importance.</li>
</ul>
<p>Exemple : sur la table <code>customers</code>, en appliquant les <code>updates</code> — Peter est mis à jour avec sa dernière info, Samarth est supprimé, Kostas est inséré.</p>
<h4>SCD Type 2 (historisation / versioning)</h4>
<ul>
<li>Quand un enregistrement change, l'ancien est <strong>conservé</strong> avec une colonne indiquant sa <strong>période de validité</strong> (date de début, date de fin, ou flag courant), et un <strong>nouvel</strong> enregistrement est inséré avec l'info à jour.</li>
<li>Une suppression conserve la ligne et la marque inactive.</li>
<li>À utiliser quand l'<strong>historique est important</strong> (ex. suivre l'évolution de l'adresse ou du statut d'un client).</li>
<li>Colonnes typiques <code>__START_AT</code> / <code>__END_AT</code> : un <code>__END_AT</code> à <code>null</code> indique la ligne <strong>courante</strong>, une valeur non nulle indique une ligne <strong>historique (inactive)</strong>.</li>
<li><em>Hors périmètre détaillé du cours.</em></li>
</ul>
<h4>AUTO CDC INTO (anciennement APPLY CHANGES INTO)</h4>
<p>À utiliser au lieu d'un batch traditionnel avec une syntaxe <code>MERGE INTO</code> complexe. Les INSERT et UPDATE sont implémentés <strong>implicitement via les clés</strong>, sans code.</p>
<pre><code>CREATE OR REFRESH STREAMING TABLE customers;

CREATE FLOW scd_type_1_flow AS
AUTO CDC INTO customers
FROM STREAM updates
KEYS (CustomerID)
APPLY AS DELETE WHEN operation = "DELETE"
SEQUENCE BY ProcessDate
COLUMNS * EXCEPT (operation)
STORED AS SCD TYPE 1;</code></pre>
<ul>
<li>On crée d'abord une streaming table, puis on utilise <code>AUTO CDC</code> pour la peupler.</li>
<li><code>FROM STREAM updates</code> : les enregistrements source qui déterminent updates/deletes/inserts.</li>
<li><code>KEYS (CustomerID)</code> : la/les colonne(s) qui identifient une ligne dans source et cible.</li>
<li><code>APPLY AS DELETE WHEN</code> : quand un événement CDC doit être traité comme un <strong>DELETE</strong> plutôt qu'un upsert.</li>
<li><code>SEQUENCE BY ProcessDate</code> : l'<strong>ordre logique</strong> des événements CDC dans la source.</li>
<li><code>COLUMNS * EXCEPT (operation)</code> : sous-ensemble de colonnes à inclure dans la cible.</li>
<li><code>STORED AS SCD TYPE 1</code> (défaut) ou <code>TYPE 2</code>.</li>
</ul>
<div class="callout"><strong>AUTO CDC FROM SNAPSHOT</strong> (Public Preview au Q2 2025) traite les changements à partir de <em>snapshots</em> de base de données.</div><div class="demo"><span class="demo-label">Exemple — AUTO CDC INTO (SCD Type 1)</span><p>On crée la table cible, puis un <strong>flow</strong> <code>AUTO CDC INTO</code> qui applique les changements (updates/deletes/inserts) en ordonnant par une colonne de séquence :</p><pre><code>-- Table cible
CREATE OR REFRESH STREAMING TABLE 2_silver_db.scd_type_1_customers_silver_demo6
  COMMENT 'SCD Type 1 Historical Customer Data';

-- Flow CDC
CREATE FLOW scd_type_1_flow AS
AUTO CDC INTO 2_silver_db.scd_type_1_customers_silver_demo6   -- table cible
FROM STREAM 1_bronze_db.customers_bronze_clean_demo6          -- source des changements
  KEYS (customer_id)                              -- clé primaire d'identification
  APPLY AS DELETE WHEN operation = "DELETE"       -- gestion des suppressions
  SEQUENCE BY timestamp_datetime                  -- ordre d'application des changements
  COLUMNS * EXCEPT (timestamp, _rescued_data, operation)
  STORED AS SCD TYPE 1;                           -- SCD Type 1 (pas d'historique)</code></pre><p class="demo-note">Passer <code>STORED AS SCD TYPE 2</code> pour conserver l'historique des versions. La cible doit exister avant le <code>CREATE FLOW</code>.</p></div><h4>Pipeline complet — CDC clients (synthèse)</h4><p>Ce pipeline de bout en bout réunit la plupart des notions vues jusqu’ici : ingestion incrémentale par <strong>Auto Loader</strong>, <strong>colonnes de métadonnées</strong>, <strong>expectations</strong> de qualité, et application des changements via <strong>AUTO CDC INTO</strong> en <strong>SCD Type 1</strong>.</p><div class="demo"><span class="demo-label">STEP 1 — JSON → Bronze (ingestion Auto Loader)</span><p>Ingestion incrémentale des fichiers JSON du flux CDC vers une streaming table, en capturant l’horodatage de traitement et le fichier source :</p><pre><code>CREATE OR REFRESH STREAMING TABLE 1_bronze_db.customers_bronze_raw_demo6
  COMMENT "Raw data from customers CDC feed"
  TBLPROPERTIES (
    "quality" = "bronze",
    "pipelines.reset.allowed" = false   -- empêche un full refresh du bronze
  )
AS
SELECT
  *,
  current_timestamp()  AS processing_time,  -- horodatage d'ingestion des lignes
  _metadata.file_name  AS source_file       -- nom du fichier source
FROM STREAM read_files(
  "$\{source}/customers",
  format =&gt; "json"
);</code></pre></div><div class="demo"><span class="demo-label">STEP 2 — Bronze clean (enforcement qualité)</span><p>Table bronze nettoyée avec contraintes <code>EXPECT</code> : id non nul (<code>FAIL UPDATE</code>), opération non nulle et email valide (<code>DROP ROW</code>), nom/adresse en warn — sauf pour les suppressions :</p><pre><code>CREATE STREAMING TABLE 1_bronze_db.customers_bronze_clean_demo6
(
  CONSTRAINT valid_id        EXPECT (customer_id IS NOT NULL) ON VIOLATION FAIL UPDATE,
  CONSTRAINT valid_operation EXPECT (operation  IS NOT NULL) ON VIOLATION DROP ROW,
  CONSTRAINT valid_name      EXPECT (name IS NOT NULL OR operation = "DELETE"),
  CONSTRAINT valid_address   EXPECT (
    (address IS NOT NULL AND city IS NOT NULL AND
     state IS NOT NULL AND zip_code IS NOT NULL)
    OR operation = "DELETE"),
  CONSTRAINT valid_email     EXPECT (
    rlike(email, '^([a-zA-Z0-9_\\-\\.]+)@([a-zA-Z0-9_\\-\\.]+)\\.([a-zA-Z]{2,5})$')
    OR operation = "DELETE") ON VIOLATION DROP ROW
)
COMMENT "Clean raw bronze timestamp column and add data quality constraints"
AS
SELECT
  *,
  CAST(from_unixtime(timestamp) AS timestamp) AS timestamp_datetime
FROM STREAM 1_bronze_db.customers_bronze_raw_demo6;</code></pre></div><div class="demo"><span class="demo-label">STEP 3 — Bronze clean → Silver (AUTO CDC INTO, SCD Type 1)</span><p>On crée la table cible, puis un <code>CREATE FLOW</code> avec <code>AUTO CDC INTO</code> qui applique updates / deletes / inserts en ordonnant par <code>timestamp_datetime</code> :</p><pre><code>-- Créer la table cible si elle n'existe pas
CREATE OR REFRESH STREAMING TABLE 2_silver_db.scd_type_1_customers_silver_demo6
  COMMENT 'SCD Type 1 Historical Customer Data';

-- Appliquer le SCD Type 1
CREATE FLOW scd_type_1_flow AS
AUTO CDC INTO 2_silver_db.scd_type_1_customers_silver_demo6  -- table cible (SCD Type 1 ou 2)
FROM STREAM 1_bronze_db.customers_bronze_clean_demo6         -- source des changements
  KEYS (customer_id)                              -- clé primaire d'identification
  APPLY AS DELETE WHEN operation = "DELETE"       -- gestion des suppressions source -&gt; cible
  SEQUENCE BY timestamp_datetime                  -- ordre d'application des changements
  COLUMNS * EXCEPT (timestamp, _rescued_data, operation)   -- exclut les champs techniques
  STORED AS SCD TYPE 1;                           -- SCD Type 1 (pas d'historique)</code></pre><p class="demo-note">Remplacer par <code>STORED AS SCD TYPE 2</code> pour conserver l’historique des versions. La table cible doit exister <em>avant</em> le <code>CREATE FLOW</code>.</p></div>`

<h4>Vue d'ensemble</h4>
<ul>
<li><strong>Continuous Integration (CI)</strong> : automatise et fluidifie le développement ; améliore qualité, vitesse et fiabilité du code.</li>
<li><strong>Continuous Deployment (CD)</strong> : le code est déployé en production via un processus automatisé ; permet de livrer en cycles courts et fréquents, avec des pipelines automatisés pour rapidité et cohérence.</li>
<li><strong>Adoption :</strong> pratique courante en développement logiciel, dont l'importance croît en data engineering et data science.</li>

<h4>CI — vue détaillée</h4>
<p>La CI consiste à <strong>fusionner régulièrement</strong> les changements de plusieurs contributeurs dans un dépôt central et à lancer des <strong>tests automatisés</strong> pour garantir la qualité. Bénéfices : <strong>détection précoce des problèmes, cycle de développement plus rapide, meilleure collaboration et qualité, tests et validation automatisés</strong>. Elle s'appuie sur le version control et une stratégie de branches.</p>

<div class="mini-card"><strong>Integration Tests</strong><br/>Interaction entre composants ou systèmes. Ex. : interactions Notebooks / SDP / Jobs.</div>
<div class="mini-card"><strong>System Tests</strong><br/>Toute l'application en conditions réelles. <strong>Lents</strong>. Ex. : pipeline data end-to-end dans un Job.</div>

    actual_df = add_new_col(df, "new_value", "value")

    # 3) Construire le résultat attendu
    expected_data = [(0,'Normal'), (1,'Unknown'), (-1,'Unknown'), (None,'Unknown')]
    expected_df = spark.createDataFrame(expected_data, ["value","new_value"])

    # 4) Comparer : si différent, une erreur est renvoyée
    assertDataFrameEqual(actual_df, expected_df)</code></pre>
